<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canva Clone</title>

    <link rel="stylesheet" href="canva2.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="demo.css">
</head>

<body>


    <nav class="navbar">

        <div class="left">
            <a href="#">File</a>
            <a href="#">Resize</a>
            <a href="#">Editing</a>
        </div>

        <div class="center">
            Sample
        </div>

        <div class="right">

            <button class="trial-btn">
                👑 Start your trial for ₹0
            </button>

            <div class="profile">
                <i class="fa-solid fa-user"></i>
            </div>

            <div class="icon-box">
                <i class="fa-solid fa-chart-simple"></i>
            </div>

            <div class="icon-box">
                <i class="fa-regular fa-comment"></i>
            </div>

            <button class="present-btn">
                Present
            </button>

            <button class="share-btn">
                Share
            </button>

        </div>

    </nav>


    <div class="main">

        <!-- MENU -->

        <div class="menu">

            <div class="item">
                <i class="fa-solid fa-layer-group"></i>
                <span>Templates</span>
            </div>

            <div class="item">
                <i class="fa-solid fa-shapes"></i>
                <span>Elements</span>
            </div>

            <div class="item">
                <i class="fa-solid fa-font"></i>
                <span>Text</span>
            </div>

            <div class="item">
                <i class="fa-solid fa-image"></i>
                <span>Uploads</span>
            </div>

            <div class="item">
                <i class="fa-solid fa-pen"></i>
                <span>tool</span>
            </div>
        

        </div>

        <!-- SIDEBAR -->

        <div class="sidebar">

            <div class="search-box">
                <input type="text" placeholder="Describe your ideal design">
                <i class="fa-solid fa-microphone"></i>
            </div>

            <div class="buttons">

                <button class="generate">
                    Generate
                </button>

                <button class="search">
                    Search
                </button>

            </div>

            <h3>Recently Used</h3>

            <div class="gallery">
                <img src="https://picsum.photos/200/120?1">
                <img src="https://picsum.photos/200/120?2">
                <img src="https://picsum.photos/200/120?3">
                <img src="https://picsum.photos/200/120?4">
                 <img src="https://picsum.photos/200/120?1">
                <img src="https://picsum.photos/200/120?2">
                <img src="https://picsum.photos/200/120?3">
                <img src="https://picsum.photos/200/120?4">
                <img src="https://picsum.photos/200/120?2">
                <img src="https://picsum.photos/200/120?3">
                <img src="https://picsum.photos/200/120?4">
            </div>

        </div>

        <!-- WORKSPACE -->

        <div class="workspace">

            <div class="canvas">

                <div class="shape-circle"></div>

                <div class="square"></div>

                <div class="triangle"></div>

                <div class="pentagon"></div>

                <div class="plus"></div>

                <div class="parallelogram"></div>

                <div class="arrow"></div>

                <div class="heart-wrapper">
                    <div class="heart"></div>
                </div>

            </div>

        </div>

    </div>

</body>

</html>
