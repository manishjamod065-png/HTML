<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="canva.css">
</head>
<body>

    <header class="topbar">
        <div class="left-menu">
            <span>File</span>
            <span>Resize</span>
            <span>🖉Editing</span>
             <span>↩</span>
            <span>↪</span>
           



        </div>

        <div class="right-menu">

            <button>Present</button>
            <button>Share</button>
        </div>
    </header>

    <div class="main">

        <aside class="sidebar">
            <div class="menu-item">Templates</div>       
            <div class="menu-item">Elements</div>
            <div class="menu-item">Text</div>
            <div class="menu-item">Brand</div>
            <div class="menu-item">Uploads</div>
            <div class="menu-item">Tools</div>
            <div class="menu-item">Projects</div>
            <div class="menu-item">Apps</div>
            <div class="menu-item">Magic media</div>
            <div class="menu-item">Audio</div>
            <div class="menu-item">Vedioform</div>

        </aside>

        <section class="workspace">

            <div class="search-box">
                <input type="text" placeholder="Describe your ideal design">
                <button>Generate</button>
            </div>

            <div class="canvas">

                <div class="circle"></div>
                <div class="square"></div>
                <div class="triangle"></div>
                <div class="pentagon"></div>

                <div class="plus">
                    <div class="horizontal"></div>
                    <div class="vertical"></div>
                </div>

                <div class="parallelogram"></div>

                <div class="arrow"></div>

                <div class="heart"></div>

            </div>

        </section>

    </div>

</body>
</html>
